<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/images/fight_club.png">
    <title>User Register page</title>
</head>
<body>

    <!--this is the navigation bar-->
    <nav class="navbar">
    <img src="/images/fight_club.png" alt="logo">
    <div class="nav-links">
      <a href="/index.html#about">About</a>
      <a href="/index.html#event">Events</a>
      <a href="/index.html">Home</a>
      <a href="/index.html#contact">Contact</a>
    </div>
    <div class="auth-buttons">
      <a href="user_login.html">Login</a>
      <a href="/pages/admin_login.html">Admin Login</a>
    </div>
  </nav>

  <div class="main">

    <!--main title-->
    <img src="/images/fight_club.png" alt="logo">
    <h2>Register as Fighter</h2>

  </div>

  <!--Registratin form-->
  <div class="register-form">

    <form name="user-register" method="post" action="">

        <label for="f-name">First Name</label><br>
        <input name="first-name" type="text" id="f-name" required><br><br>

        <label for="l-name">Last Name</label><br>
        <input name="last-name" type="text" id="l-name" required><br><br>


        <label for="new-user">Username</label><br>
        <input name="username" type="text" id="new-user" placeholder="Habib123" required><br><br>

        <label for="email">Email Address</label><br>
        <input name="email" type="email" id="email" placeholder="example@uniten.edu.my" required><br><br>

        <label for="pass">Password</label><br>
        <input name="password" type="password" id="pass" required><br><br>

        <label for="con-pass">Confirm Password</label><br>
        <input name="con-password" type="password" id="con-pass" required><br><br>

        <input name="agree" type="checkbox" value="agreed" id="agree" required>
        <label for="agree">I agree to the Terms of Service and Privacy Policy</label><br><br>

        <input type="submit" value="REGISTER">



    </form>

    <!--already has an account-->
    <div >
        <p>Already have an account? <a href="user_login.html">Login</a></p>
        <a href="/index.html">Back to Home</a>
    </div>

  </div>


  <!--print error massage using php-->

  </div>
    
</body>
</html>
